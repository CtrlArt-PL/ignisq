services:
  ignisq:
    build: .
    container_name: ignisq_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9191:9191"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          memory: 32M